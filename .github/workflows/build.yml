name: Build Labelpad
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Tests (headless — no display server needed)
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pillow system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libjpeg-dev zlib1g-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Windows: EXE installer + portable ZIP
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.6.0

      - name: Build EXE with PyInstaller
        run: pyinstaller labeler.spec --clean --noconfirm

      - name: Show dist contents
        run: |
          Write-Host "=== dist\ ==="
          Get-ChildItem -Recurse dist\ | Select-Object FullName | Format-Table -AutoSize

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path installer_output

      - name: Build installer with NSIS
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "C:\Program Files\NSIS\makensis.exe"
          }
          $distPath = (Get-Item "dist").FullName
          $dirs = Get-ChildItem -Path $distPath -Directory
          if ($dirs.Count -eq 0) {
            Write-Error "No subdirectory found in dist\ — PyInstaller output missing."
            exit 1
          }
          $appDir = $dirs[0].FullName
          Write-Host "Using dist folder: $appDir"
          $version = "${{ github.ref_name }}"
          & $makensis /DDIST_PATH="$appDir" /DVERSION="$version" installer\labelpad.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $existing = Get-ChildItem installer_output\*.exe | Select-Object -First 1
          if ($existing.Name -ne "Labelpad_${version}_setup.exe") {
            Rename-Item $existing.FullName "Labelpad_${version}_setup.exe"
          }

      - name: Zip portable EXE
        run: |
          $version = "${{ github.ref_name }}"
          $distPath = (Get-ChildItem -Path dist -Directory)[0].FullName
          Compress-Archive -Path "$distPath\*" `
            -DestinationPath "installer_output\Labelpad_${version}_portable_win.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            installer_output/Labelpad_${{ github.ref_name }}_setup.exe
            installer_output/Labelpad_${{ github.ref_name }}_portable_win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # macOS: DMG installer + PKG installer
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.6.0

      - name: Clean previous build artifacts
        run: rm -rf dist build

      - name: Build .app bundle with PyInstaller
        run: pyinstaller labeler.spec --clean --noconfirm

      - name: Show dist contents
        run: |
          echo "=== dist/ ==="
          find dist/ -maxdepth 3 -print

      - name: Create output directory
        run: mkdir -p installer_output

      - name: Build DMG with hdiutil
        run: |
          VERSION="${{ github.ref_name }}"
          APP_PATH=$(find dist -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist/ — PyInstaller output missing."
            exit 1
          fi
          echo "Using .app bundle: $APP_PATH"
          hdiutil create \
            -volname "Labelpad" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "installer_output/Labelpad_${VERSION}_mac.dmg"

      - name: Build PKG installer
        run: |
          VERSION="${{ github.ref_name }}"
          APP_PATH=$(find dist -name "*.app" -maxdepth 2 | head -1)
          pkgbuild \
            --component "$APP_PATH" \
            --install-location /Applications \
            --identifier "com.labelpad.app" \
            --version "${VERSION}" \
            "installer_output/Labelpad_${VERSION}_mac.pkg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            installer_output/Labelpad_${{ github.ref_name }}_mac.dmg
            installer_output/Labelpad_${{ github.ref_name }}_mac.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
